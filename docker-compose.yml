services:
  # --- ROL: INTEGRANTE A y B (Core & Lógica) ---
  blockchain-node:
    build:
      context: ./blockchain-core
      dockerfile: Dockerfile
    container_name: blockchain_node
    volumes:
      - ./blockchain-core/data:/data/db
    networks:
      - voting-network
    ports:
      - "30333:30333" # P2P para otros nodos
      - "9944:9944"   # RPC/WebSocket para la API
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9944/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # --- ROL: INTEGRANTE C (API & Conector) ---
  api-gateway:
    build:
      context: ./api-rust
      dockerfile: Dockerfile
    container_name: api_gateway
    depends_on:
      blockchain-node:
        condition: service_healthy
      database-aux:
        condition: service_started
    environment:
      - DATABASE_URL=postgres://user:pass@database-aux:5432/voting_db
      - NODE_RPC_URL=http://blockchain-node:9944
      - RUST_LOG=info
      - RUST_BACKTRACE=1
    networks:
      - voting-network
    ports:
      - "8080:8080"
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s

  # --- ROL: INTEGRANTE C (Persistencia Auxiliar) ---
  database-aux:
    image: postgres:16-alpine
    container_name: database_aux
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: voting_db
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    networks:
      - voting-network
    ports:
      - "5432:5432"
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d voting_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- ROL: INTEGRANTE D (Frontend & UI) ---
  frontend-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_app
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_URL=http://api-gateway:8080
      - NODE_ENV=production
    networks:
      - voting-network
    ports:
      - "3000:3000"
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  voting-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data: