version: '3.8'

services:
  blockchain-node:
    build:
      context: ./blockchain-core
      dockerfile: Dockerfile
    container_name: blockchain_node_dev
    volumes:
      - ./blockchain-core/src:/app/src
      - ./blockchain-core/data:/data/db
    networks:
      - voting-network
    ports:
      - "30333:30333"
      - "9944:9944"
    environment:
      - RUST_LOG=debug
    command: sh -c "sleep infinity"

  api-gateway:
    build:
      context: ./api-rust
      dockerfile: Dockerfile
    container_name: api_gateway_dev
    volumes:
      - ./api-rust/src:/app/src
    networks:
      - voting-network
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://user:pass@database-aux:5432/voting_db
      - NODE_RPC_URL=http://blockchain-node:9944
      - RUST_LOG=debug

  database-aux:
    image: postgres:16-alpine
    container_name: database_aux_dev
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: voting_db
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - voting-network
    ports:
      - "5432:5432"

  frontend-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: frontend_app_dev
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - voting-network
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api-gateway:8080
      - NODE_ENV=development
    command: npm run dev

networks:
  voting-network:
    driver: bridge

volumes:
  postgres_data_dev: